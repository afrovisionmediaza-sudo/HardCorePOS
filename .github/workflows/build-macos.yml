name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build DMG
        run: npm run dist:mac
      
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: HardCorePOS-DMG
          path: |
            dist/*.dmg
            installers/*.dmg